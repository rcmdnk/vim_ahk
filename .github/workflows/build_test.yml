on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

name: Build

jobs:
  build:
    name: Build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Build with latest AutoHotkey release
        uses: benmusson/ahk2exe-action@v1
        with:
          in: .\vim.ahk
          out: .\vim_ahk\vim_ahk.exe
          target: x64
          compression: upx
          ahk-tag: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Copy icons
        shell: cmd
        run: xcopy /i /y vim_ahk_icons vim_ahk\vim_ahk_icons
      - name: zip
        shell: pwsh
        run:
          Compress-Archive -Path "vim_ahk" -DestinationPath vim_ahk-${{github.ref_name}}.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vim_ahk
          path: vim_ahk/
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vim_ahk-${{github.ref_name}}.zip
